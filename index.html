<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>S-IT Smart Learning (6-8)</title>
    <link rel="stylesheet" href="S678style.css">
    
    <link rel="icon" type="image/png" href="1775391084235.png">
    <link rel="icon" sizes="192x192" href="1775391084235.png">
    <link rel="icon" sizes="512x512" href="1775391084235.png">
    <link rel="apple-touch-icon" href="1775391084235.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
</head>
<body class="S-light-theme">

    <header class="S-top-bar">
        <div class="S-top-left">
            <button class="S-icon-btn" onclick="toggleS678Menu()">
                <ion-icon name="menu-outline" id="S-main-menu-icon"></ion-icon>
            </button>
            <button class="S-icon-btn" onclick="toggleS678Theme()">
                <ion-icon name="moon-outline" id="S-theme-icon"></ion-icon>
            </button>
        </div>
        
        <div class="S-central-title">
            <h1>IT SMART LEARNING</h1>
            <div id="S-breadcrumb">Select a Class</div>
        </div>

        <div class="S-top-right">
            <button class="S-btn-toggle" onclick="switchS678Class(6, event)">Class 6</button>
            <button class="S-btn-toggle" onclick="switchS678Class(7, event)">Class 7</button>
            <button class="S-btn-toggle" onclick="switchS678Class(8, event)">Class 8</button>
        </div>
    </header>

    <div class="S-main-wrapper">
        <aside id="S-left-menu" class="S-sidebar">
            <div class="S-search-box">
                <input type="text" id="S-search-input" placeholder="Search topics..." onkeyup="searchS678Topics()">
            </div>
            <div id="S-unit-container">
                <div style="padding:20px; text-align:center; color:var(--S-text-muted);">
                    Click a Class button to load syllabus.
                </div>
            </div>
        </aside>

        <main id="S-content-display" class="S-content-panel">
            <div class="S-content-tools">
                <button onclick="adjustS678Font(1)">A+</button>
                <button onclick="adjustS678Font(-1)">A-</button>
                <button onclick="toggleS678FullScreen()">
                    <ion-icon name="expand-outline"></ion-icon>
                </button>
            </div>

            <div class="S-card">
                <article id="S-actual-content">
                    <h1 id="S-content-heading">Welcome, Teacher!</h1>
                    <hr style="border:0; border-top:1px solid var(--S-border); margin:20px 0;">
                    <div id="S-content-body">
                        Please select Class 6, 7, or 8 from the top right to start the lesson.
                    </div>
                </article>
            </div>
        </main>
    </div>

    <script src="Sdata6.js"></script>
    <script src="Sdata7.js"></script>
    <script src="Sdata8.js"></script>
    <script src="S678engine.js"></script>
    
    <script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').then(reg => {
        
        // Naya update check karne ka logic
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              // Jab naya code install ho jaye, auto-reload karein
              window.location.reload();
            }
          });
        });

      }).catch(err => console.log("SW Error:", err));
    });
  }
</script>

</body>
</html>
